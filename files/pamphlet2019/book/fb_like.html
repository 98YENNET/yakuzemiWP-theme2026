<!DOCTYPE html>
<!-- saved from url=(0014)about:internet -->
<html>
<head>
    <title>Facebook Like</title>
    <meta charset="UTF-8">

    <!-- コンテンツ幅100% -->
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0"/>

    <script type="text/javascript">

        //getパラメータ取得
        function getRequest() {
            if (location.search.length > 1) {
                var get = new Object();
                var ret = location.search.substr(1).split("&");
                for (var i = 0; i < ret.length; i++) {
                    var r = ret[i].split("=");
                    get[r[0]] = r[1];
                }
                return get;
            } else {
                return false;
            }
        }

        //iframeにsrcを設定
        function setFrameSrc() {
            var get = getRequest();
            var lnkurl = "https://www.facebook.com/plugins/like.php?href=" + get['href'];
            document.getElementById("fbFrame").src = lnkurl;

        }

    </script>

</head>

<body onload="setFrameSrc()">
<div id="base">
    <iframe id='fbFrame' scrolling='no' frameborder='0' style='border:none; width:100%; height:100'></iframe>
</div>
</body>

</html>
